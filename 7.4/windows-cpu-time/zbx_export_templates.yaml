                  // Convert object to array
                  for (var name in sums) {
                      if (sums.hasOwnProperty(name)) {
                          output.push({
                              "Name": name,
                              "CPUTime": sums[name]
                          });
                      }
                  }
                  
                  return JSON.stringify(output);
