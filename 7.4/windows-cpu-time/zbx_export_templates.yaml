        - uuid: 419f30fb0007431c9f7cc94f1ad292d1
          name: deltaProtect
          type: DEPENDENT
          key: deltaProtect
          history: '{$DBG}'
          value_type: LOG
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  // extract delta
                  var input = JSON.parse(value);
                  
                  var list1 = JSON.parse(input[0].value);
                  var list2 = JSON.parse(input[1].value);
                  
                  function aggregate(list) {
                      var map = {};
                  
                      for (var i = 0; i < list.length; i++) {
                          var item = list[i];
                  
                          if (!map[item.Name]) {
                              map[item.Name] = 0;
                          }
                  
                          // Sum CPUTime for processes with the same name
                          map[item.Name] += Number(item.CPUTime);
                      }
                  
                      return map;
                  }
                  
                  var cpu1 = aggregate(list1);
                  var cpu2 = aggregate(list2);
                  
                  var output = [];
                  
                  for (var name in cpu1) {
                      output.push({
                          Name: name,
                          Delta: cpu1[name] - (cpu2[name] || 0)
                      });
                  }
                  
                  // Include names that exist only in the second list
                  for (var name in cpu2) {
                      if (!(name in cpu1)) {
                          output.push({
                              Name: name,
                              Delta: -cpu2[name]
                          });
                      }
                  }
                  
                  return JSON.stringify(output);
          master_item:
            key: fetch.history.stats
          tags:
            - tag: debug
        - uuid: 37e953f635084578991f3cd3035c0bbc
          name: fetch.history.stats
          type: CALCULATED
          key: fetch.history.stats
          value_type: LOG
          params: '1'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var url = '{$ZABBIX.URL}/api_jsonrpc.php'
                  
                  // new http request
                  var req = new HttpRequest();
                  
                  // header
                  req.addHeader('Content-Type: application/json');
                  req.addHeader('Authorization: Bearer {$ZABBIX.API.TOKEN}');
                  
                  // extract itemid and data type
                  var el = JSON.parse(req.post(url,
                    '{"jsonrpc":"2.0","method":"item.get","params":{"output":["itemid","value_type"],"hostids":"{$HOST.ID}","filter":{"key_":"total"}},"id":1}'
                  )).result[0];
                  
                  // fetch 2 most recent samples
                  var context = JSON.parse(req.post(url,
                    '{"jsonrpc":"2.0","method":"history.get","params":{"output":["value"],"history":' + el.value_type + ',"itemids":"' + el.itemid + '","sortfield":"clock","sortorder":"DESC","limit":2},"id":1}'
                  )).result;
                  
                  
                  return JSON.stringify(context);
          tags:
            - tag: debug
