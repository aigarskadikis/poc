      name: Templates/Modules
  templates:
    - uuid: 1a615d32a9db492c95c8f44911db3015
      template: 'Zabbix resource consumptions memory leak'
      name: 'Zabbix resource consumptions memory leak'
      groups:
        - name: Templates/Modules
      items:
        - uuid: 22adf04abd65462cb92c71cf1a018c83
          name: gate
          type: DEPENDENT
          key: all.pids.gate
          value_type: LOG
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var result = [];
                  
                  for (var i = 0; i < data.length; i++) {
                      var obj = data[i];
                  
                      if (obj.cmdline) {
                          obj.cmdline = obj.cmdline.replace(/ \[.*/, '').replace(/#/, '').replace(/ started/, '');
                      }
                  
                      result.push(obj);
                  }
                  
                  return JSON.stringify(result);
          master_item:
            key: 'proc.get[,zabbix,".*zabbix_.*",]'
        - uuid: c028e71cafbf49a8b44df0b8a0fdc882
          name: all
          type: ZABBIX_ACTIVE
          key: 'proc.get[,zabbix,".*zabbix_.*",]'
          delay: 0;s46
          history: '0'
          value_type: LOG
          timeout: 3s
      discovery_rules:
        - uuid: 1bf792d4fccb40a69af0c12fbccc9dc8
          name: process
          type: DEPENDENT
          key: process
          filter:
            conditions:
              - macro: '{#CMDLINE}'
                value: '.*\.conf'
                operator: NOT_MATCHES_REGEX
          lifetime_type: DELETE_IMMEDIATELY
          item_prototypes:
            - uuid: fc77ebb886984cf0ade4c1315613e2eb
              name: '{#CMDLINE} raw'
              type: DEPENDENT
              key: 'all["{#CMDLINE}"]'
              history: '0'
              value_type: LOG
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$..[?(@.[''cmdline''] == ''{#CMDLINE}'')].first()'
              master_item:
                key: all.pids.gate
              tags:
                - tag: component
                  value: raw
            - uuid: e3ec2a591eb340b4ae901159fca2b66b
              name: 'cpu: {{#CMDLINE}.regsub("(:)* (.*)",\2)}'
              type: DEPENDENT
              key: 'cputime["{#CMDLINE}"]'
              value_type: FLOAT
              units: s
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var i=JSON.parse(value);return i.cputime_user+i.cputime_system;'
                - type: SIMPLE_CHANGE
              master_item:
                key: 'all["{#CMDLINE}"]'
              tags:
                - tag: bin
                  value: '{#NAME}'
                - tag: category
                  value: '{{#CMDLINE}.regsub(": ([a-z ]+)( )*",\1)}'
                - tag: cpu
                  value: total
            - uuid: 53e4621b9eff48d5815f96573fe60e9f
