          triggers:
            - uuid: 6ba20c8da1554484ae616d6d14221768
              expression: 'last(/pid mon/element.clount.of.process) > ( {$SCH:delay} - 20 )'
              name: 'process monitoring will reach overlaping soon'
              event_name: 'process monitoring has reached {$SCH:delay} elements'
              priority: DISASTER
              manual_close: 'YES'
        - uuid: a4becf905f2d486e840a730cd6c9c3e5
          name: gate
          type: DEPENDENT
          key: gate
          history: '0'
          value_type: TEXT
          inventory_link: HARDWARE_FULL
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$..[?(!(@.[''ppid''] == 2))]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JSONPATH
              parameters:
                - '$..[?(@.["ppid"] > 0)]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JSONPATH
              parameters:
                - '$..[?((@.[''user''] =~ ''^{$USER:target}$''))]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JSONPATH
              parameters:
                - '$..[?((@.[''name''] =~ ''^{$COMM:target}$''))]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JSONPATH
              parameters:
                - '$..[?(!(@.[''cmdline''] =~ ''digitalocean''))]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JSONPATH
              parameters:
                - '$..[?(!(@.[''name''] =~ ''^{$COMM:ignore}$''))]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JAVASCRIPT
              parameters:
                - |
                  var lld = [];
                  var lines = JSON.parse(value);
                  for (i = 0; i < lines.length; i++) {
                    var row = {};
                    row["pid"] = lines[i].pid;
                    row["ppid"] = lines[i].ppid;
                    row["name"] = lines[i].name;
                  
                  if (lines[i].cmdline.match(/(postgres: \S+ \S+ [0-9\.]+)/)) {
                  row["cmdline"] = lines[i].cmdline.match(/(postgres: \S+ \S+ [0-9\.]+)/)[1];
                  } else {
                  row["cmdline"] = lines[i].cmdline.replace(/\s+$/, '').replace(/ \[[^\]]+\]$/, '');
                  }
                  
                  lld.push(row);
                  }
                  
                  return JSON.stringify(lld);
            - type: JAVASCRIPT
              parameters:
                - |
                  // sort
                  function sortJson(obj) {
                    if (Object.prototype.toString.call(obj) === '[object Object]') {
                      var sortedObj = {};
                      var keys = [];
                      for (var key in obj) {
                        if (obj.hasOwnProperty(key)) {
                          keys.push(key);
                        }
                      }
                      keys.sort();
                      for (var i = 0; i < keys.length; i++) {
                        var k = keys[i];
                        sortedObj[k] = sortJson(obj[k]);
                      }
                      return sortedObj;
                    } else if (Object.prototype.toString.call(obj) === '[object Array]') {
                      var sortedArray = [];
                      for (var j = 0; j < obj.length; j++) {
                        sortedArray.push(sortJson(obj[j]));
                      }
                      return sortedArray.sort(function (a, b) {
                        return JSON.stringify(a) > JSON.stringify(b) ? 1 : -1;
                      });
                    } else {
                      return obj;
                    }
                  }
                  
                  return JSON.stringify(sortJson(JSON.parse(value)));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          master_item:
            key: protect
          tags:
            - tag: ppid
        - uuid: fb93e94f98cb45ad8377fdfb481d4791
          name: memory.leaders
          type: DEPENDENT
          key: memory.leaders
          value_type: LOG
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$..[?(!(@.[''ppid''] == 2))]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JSONPATH
              parameters:
                - '$..[?(@.["ppid"] > 0)]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JAVASCRIPT
              parameters:
                - |
                  var lld = [];
                  var lines = JSON.parse(value);
                  for (i = 0; i < lines.length; i++) {
                    var row = {};
                    row["cmdline"] = lines[i].cmdline;
                    row["rss"] = lines[i].rss;
                  lld.push(row);
                  }
                  
                  return JSON.stringify(lld);
            - type: JAVASCRIPT
              parameters:
                - |
                  // parse to array (if you already have an array object, skip this and set arr = yourArray)
                  var arr = JSON.parse(value);
                  
                  // sort in-place by rss descending
                  arr.sort(function(a, b) {
                    var ra = Number((a && a.rss) || 0);
                    var rb = Number((b && b.rss) || 0);
                    return rb - ra; // rb - ra => descending order
                  });
                  
                  // pretty-print result
                  return JSON.stringify(arr, null, 2);
            - type: JSONPATH
              parameters:
                - '$.[0:{$LEADERS}]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
          master_item:
            key: protect
