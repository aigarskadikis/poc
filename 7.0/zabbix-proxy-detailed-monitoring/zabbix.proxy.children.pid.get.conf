UserParameter=zabbix.proxy.children.pid.get,ps auxww | grep ^zabbix.*zabbix_proxy.*conf$ | awk ' { print $2 } ' | while IFS= read -r PROXYROOTPID; do { cat /proc/${PROXYROOTPID}/task/${PROXYROOTPID}/children | grep -Eo "[0-9]+" | while IFS= read -r PID; do { echo -n '{"pid":"'${PID}'",'; cat /proc/${PID}/cmdline | sed 's| \[.*$|"},|;s|#||;s|^.*: |"name":"|' ; echo; } done; } done | tr -cd '[:print:]' | sed 's|^|[|;s|,$|]|' | sed "s|\"pid|\"host\":\"$(hostname -s)\",\"pid|g"
