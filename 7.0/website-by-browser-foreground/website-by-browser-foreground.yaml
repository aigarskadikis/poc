zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: b3cdd25d177c4614bd9864d35c767355
      template: 'Website by Browser foreground'
      name: 'Website by Browser foreground'
      description: |
        The template to monitor a website's availability and performance on the website by Browser.
        
        Zabbix server uses a web browser to perform navigation and collect performance metrics.
        
        Generated by official Zabbix template tool "Templator"
      groups:
        - name: Templates/Applications
      items:
        - uuid: 873514add91f4b488122142f3cd163e2
          name: 'Website {$WEBSITE.DOMAIN} Get data'
          type: BROWSER
          key: website.get.data
          delay: 12s
          history: '0'
          value_type: TEXT
          params: |
            const Website = {
                params: {},
            
                setParams(params) {
                    ['scheme', 'domain','width', 'height'].forEach(function (field) {
                        if (typeof params !== 'object' || !params[field]) {
                            throw new Error('Required param is not set: ' + field + '.');
                        }
                    });
                    this.params = params;
                },
            
                getOptions(browser) {
                    switch ((browser || '').trim().toLowerCase()) {
                        case 'firefox':
                            return Browser.firefoxOptions();
                        case 'safari':
                            return Browser.safariOptions();
                        case 'edge':
                            return Browser.edgeOptions();
                        default:
                            return Browser.chromeOptions();
                    }
                },
            
                getPerformance() {
            //        const browser = new Browser(Website.getOptions(Website.params.browser));
            var opts = Browser.chromeOptions();
            opts.capabilities.alwaysMatch['goog:chromeOptions'].args = [];
            const browser = new Browser(opts); 
                    const url = Website.params.scheme + '://' + Website.params.domain + '/' + Website.params.path
                    const screenshot = '';
                    browser.setScreenSize(Number(Website.params.width), Number(Website.params.height))
                    browser.navigate(url);
                    browser.collectPerfEntries();
                    screenshot = browser.getScreenshot();
                    const result = browser.getResult();
                    result.screenshot = screenshot;
            
                    return JSON.stringify(result);
                }
            };
            
            try {
                Website.setParams(JSON.parse(value));
                return Website.getPerformance();
            
            } catch (error) {
                error += (String(error).endsWith('.')) ? '' : '.';
                Zabbix.log(3, '[ Website get metrics] ERROR: ' + error);
                return JSON.stringify({ 'error': error });
            }
          description: 'Returns the JSON with performance counters of the requested website.'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
          timeout: 1m
          parameters:
            - name: browser
              value: '{$WEBSITE.BROWSER}'
            - name: domain
              value: '{$WEBSITE.DOMAIN}'
            - name: height
              value: '{$WEBSITE.SCREEN.HEIGHT}'
            - name: path
              value: '{$WEBSITE.PATH}'
            - name: scheme
              value: '{$WEBSITE.SCHEME}'
            - name: width
              value: '{$WEBSITE.SCREEN.WIDTH}'
          tags:
            - tag: component
              value: raw
        - uuid: 929515c000064fcf9aa4ce45d515959b
          name: 'Get metrics check'
          type: DEPENDENT
          key: website.metrics.check
          value_type: CHAR
          description: 'Check that the performance counters of the requested website data has been received correctly.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.error
              error_handler: CUSTOM_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 3h
          master_item:
            key: website.get.data
          tags:
            - tag: component
              value: status
          triggers:
            - uuid: 599694a470e143148620ae383bd910eb
              expression: 'length(last(/Website by Browser foreground/website.metrics.check))>0'
              name: 'Website by Browser: Failed to get metrics data'
              event_name: 'Website by Browser: Failed to get JSON of the requested website ''{$WEBSITE.DOMAIN}'''
              opdata: 'Current value: {ITEM.LASTVALUE1}'
              priority: HIGH
              description: 'Failed to get JSON with performance counters of the requested website ''{$WEBSITE.DOMAIN}''.'
              tags:
                - tag: scope
                  value: availability
        - uuid: ecfff76c8ab94f10a6b1a204fa42505c
          name: 'Website {$WEBSITE.DOMAIN} Navigation DNS lookup time'
          type: DEPENDENT
          key: website.navigation.dns_lookup_time
          value_type: FLOAT
          trends: '0'
          units: s
          description: 'Measuring of time spent on DNS lookup (domainLookupEnd - domainLookupStart).'
