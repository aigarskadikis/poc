                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 123c60ab801a46c3bc127fba15afd7e1
              name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
              type: DEPENDENT
              key: 'net.if.status[ifOperStatus.{#SNMPINDEX}]'
              delay: '0'
              trends: '0'
              valuemap:
                name: 'IF-MIB::ifOperStatus'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.ifOperStatus
              master_item:
                key: 'raw[{#IFNAME},{#IFALIAS}]'
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 0e48b11ab8d24474868c69784944ac02
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
                  name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): Link down'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the operations status is down.
                    2. `{$IFCONTROL:"{#IFNAME}"}=1` - a user can redefine the context macro to "0", marking this interface as not important. No new trigger will be fired if this interface is down.
                    3. `last(/TEMPLATE_NAME/METRIC,#1)<>last(/TEMPLATE_NAME/METRIC,#2)` - the trigger fires only if the operational status was up to (1) sometime before (so, does not fire for "eternal off" interfaces.)
                    
                    WARNING: if closed manually - it will not fire again on the next poll, because of .diff.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: d490493fb3d14cc8ab71a4f9d1ff2d8f
              name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
              type: DEPENDENT
              key: 'net.if.type[ifType.{#SNMPINDEX}]'
              delay: '0'
              trends: '0'
              valuemap:
                name: 'IF-MIB::ifType'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.ifType
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: 'raw[{#IFNAME},{#IFALIAS}]'
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 75d970b44a034c0a9e1222c9b5379194
              name: 'Interface {#IFNAME}({#IFALIAS}): raw'
              type: DEPENDENT
              key: 'raw[{#IFNAME},{#IFALIAS}]'
              delay: '0'
              history: '0'
              value_type: LOG
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$..[?(@.[''index''] == ''{#SNMPINDEX}'')].first()'
              master_item:
                key: data
              tags:
                - tag: component
                  value: raw
          trigger_prototypes:
            - uuid: 22000fb8c34b44b2960c234045800f41
              expression: |
                change(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0 and last(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0
                and (
                last(/interfaces only 3 level/net.if.type[ifType.{#SNMPINDEX}])=6 or
                last(/interfaces only 3 level/net.if.type[ifType.{#SNMPINDEX}])=7 or
                last(/interfaces only 3 level/net.if.type[ifType.{#SNMPINDEX}])=11 or
                last(/interfaces only 3 level/net.if.type[ifType.{#SNMPINDEX}])=62 or
                last(/interfaces only 3 level/net.if.type[ifType.{#SNMPINDEX}])=69 or
                last(/interfaces only 3 level/net.if.type[ifType.{#SNMPINDEX}])=117
                )
                and
                (last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                (change(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0 and last(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}],#2)>0) or
                (last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)
              name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower speed than it was before'
              opdata: 'Current reported speed: {ITEM.LASTVALUE1}'
              priority: INFO
              description: 'This Ethernet connection has transitioned down from its known maximum speed. This might be a sign of autonegotiation issues. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              dependencies:
                - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_expression: 'last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: performance
            - uuid: 27ff99f591e546f6a927c02c35768e44
              expression: |
                (avg(/interfaces only 3 level/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) or
                avg(/interfaces only 3 level/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}])) and
                last(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                avg(/interfaces only 3 level/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) and
                avg(/interfaces only 3 level/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/interfaces only 3 level/net.if.speed[ifHighSpeed.{#SNMPINDEX}])
              name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
              event_name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage (>{$IF.UTIL.MAX:"{#IFNAME}"}%)'
              opdata: 'In: {ITEM.LASTVALUE1}, out: {ITEM.LASTVALUE3}, speed: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'The utilization of the network interface is close to its estimated maximum bandwidth.'
              manual_close: 'YES'
              dependencies:
                - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_expression: 'last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: performance
            - uuid: e844110eb37a497f8005473c068b5fb8
              expression: |
                min(/interfaces only 3 level/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}
                or min(/interfaces only 3 level/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                max(/interfaces only 3 level/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8
                and max(/interfaces only 3 level/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8
              name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): High error rate'
              event_name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): High error rate (>{$IF.ERRORS.WARN:"{#IFNAME}"} for 5m)'
              opdata: 'errors in: {ITEM.LASTVALUE1}, errors out: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'It recovers when it is below 80% of the `{$IF.ERRORS.WARN:"{#IFNAME}"}` threshold.'
              manual_close: 'YES'
              dependencies:
                - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_expression: 'last(/interfaces only 3 level/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
          graph_prototypes:
            - uuid: 3d99a5c198144afea883f3cab881a19f
              name: 'Interface {#IFNAME}({#IFALIAS}): Network traffic'
              graph_items:
                - drawtype: GRADIENT_LINE
                  color: 199C0D
                  item:
                    host: 'interfaces only 3 level'
                    key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
                - sortorder: '1'
                  drawtype: BOLD_LINE
                  color: F63100
                  item:
                    host: 'interfaces only 3 level'
                    key: 'net.if.out[ifHCOutOctets.{#SNMPINDEX}]'
                - sortorder: '2'
